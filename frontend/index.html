<!--
  index.html — Vite HTML Shell / Entry Point
  ============================================

  The single HTML page served for all routes (SPA). React mounts into
  <div id="root"> and takes over all rendering from there.

  Vite automatically injects the compiled JS/CSS bundle via a <script type="module">
  tag pointing to src/main.tsx during development (and the hashed bundle in production).

  CUSTOMIZE:
    <title>    — Set to "NL2SQL — Natural Language to SQL"
    <meta>     — Add description, viewport (already included), favicon link
    <link rel="icon"> — Add a favicon if desired (database emoji or custom icon)

  DO NOT:
    Add React-related logic here.
    Import CSS frameworks here (Tailwind is handled by PostCSS/Vite pipeline).
    Add multiple <div> mount points (React uses exactly one: #root).
-->
